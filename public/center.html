<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invitaciones — Centro de comunicación</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF2F8;--card:#fff;--ink:#13203a;--mut:#5b6b80;--dim:#8a99ad;--line:#e6ebf3;
    --wa:#0D9488;--wa-bg:#E6F6F2;--email:#2563EB;--email-bg:#E8EFFC;--both:#7C3AED;--both-bg:#F0EAFB;
    --us-bg:#F1F5F9;--us-tx:#334155;--us-ac:#64748B;
    --last-bg:#FDECEC;--last-tx:#991B1B;--last-ac:#DC2626;
    --within-bg:#E5EEFB;--within-tx:#1E40AF;--within-ac:#2563EB;
    --silent-bg:#FBF1DC;--silent-tx:#92400E;--silent-ac:#D97706;
    --next-bg:#DEF7E6;--next-tx:#166534;--next-ac:#16A34A;
    --owe-bg:#FCE7F3;--owe-tx:#9D174D;--owe-ac:#DB2777;
    --fu-bg:#EAF1FB;--fu-tx:#1E3A6B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .he{font-family:Heebo,Inter,sans-serif;direction:rtl;text-align:right;unicode-bidi:isolate}
  button{font-family:inherit;cursor:pointer}

  /* top bar */
  .top{display:flex;align-items:center;gap:14px;padding:11px 18px;background:#0F172A;color:#fff;flex-shrink:0}
  .top .ttl{font-weight:800;font-size:16px;letter-spacing:.3px;white-space:nowrap}
  .langtabs{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:3px;gap:3px}
  .langtabs button{font-size:13.5px;font-weight:800;color:#cbd5e1;background:transparent;border:none;border-radius:7px;padding:6px 15px}
  .langtabs button.on{background:#FFCC33;color:#241a00}
  .stats{display:flex;gap:7px;flex-wrap:wrap;font-size:12.5px}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:4px 9px;color:#cbd5e1;font-family:inherit;font-size:12.5px}
  .stat.act{cursor:pointer}
  .stat.act:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}
  .stat .addmini{margin-left:5px;font-weight:900;color:#FFCC33}
  .stat .auto{margin-left:5px;font-weight:800;color:#f9a8d4;font-size:11px}
  .stat b{color:#fff;font-weight:800}
  .stat.owe{background:rgba(219,39,119,.18);border-color:rgba(219,39,119,.4);color:#f9a8d4}
  .stat.book{background:rgba(16,163,74,.16);border-color:rgba(16,163,74,.4);color:#86efac}
  /* Expanded status-row tag colors (soft tints on the dark bar) + active filter outline. */
  .stat.t-pink{background:rgba(219,39,119,.16);border-color:rgba(219,39,119,.34);color:#f9a8d4}
  .stat.t-green{background:rgba(16,163,74,.16);border-color:rgba(16,163,74,.34);color:#86efac}
  .stat.t-red{background:rgba(220,38,38,.16);border-color:rgba(220,38,38,.34);color:#fca5a5}
  .stat.t-redm{background:rgba(127,29,29,.22);border-color:rgba(127,29,29,.45);color:#fda4a4}
  .stat.t-amber{background:rgba(217,119,6,.16);border-color:rgba(217,119,6,.34);color:#fcd34d}
  .stat.t-gold{background:rgba(255,204,51,.18);border-color:rgba(255,204,51,.42);color:#FFCC33}
  .stat.t-blue{background:rgba(37,99,235,.16);border-color:rgba(37,99,235,.34);color:#93c5fd}
  .stat.t-violet{background:rgba(124,58,237,.16);border-color:rgba(124,58,237,.34);color:#c4b5fd}
  .stat.t-gray{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#cbd5e1}
  .stat.sel{outline:2px solid #FFCC33;outline-offset:1px}
  .top .sp{flex:1}
  .tbtn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:6px 11px;color:#e2e8f0;font-size:13px;font-weight:600}
  .tbtn input{background:transparent;border:none;outline:none;color:#fff;font-family:inherit;font-size:13px;width:88px}
  .tbtn input::placeholder{color:#94a3b8}

  /* body */
  .body{flex:1;display:flex;min-height:0;gap:10px;padding:10px;overflow-x:auto}
  .colbox{flex:1;min-width:248px;display:flex;flex-direction:column;background:var(--card);border:2px solid var(--line);border-radius:14px;overflow:hidden}
  .colbox.wa{border-color:var(--wa)} .colbox.email{border-color:var(--email)} .colbox.both{border-color:var(--both)}
  .cap{display:flex;align-items:center;gap:8px;padding:10px 12px;color:#fff;flex-shrink:0}
  .colbox.wa .cap{background:var(--wa)} .colbox.email .cap{background:var(--email)} .colbox.both .cap{background:var(--both)}
  .cap b{font-weight:800;font-size:15px;letter-spacing:.2px}
  .cap .n{opacity:.9;font-size:12.5px;font-weight:700}

  .filters{margin:9px;border:1px solid var(--line);border-radius:11px;padding:9px;flex-shrink:0}
  .filters .lab{font-size:11px;color:var(--dim);font-weight:700;margin-bottom:7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{border:1px solid transparent;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700;display:inline-flex;gap:5px;align-items:center}
  .chip .c{font-weight:900;font-size:11px;opacity:.85}
  .chip.sel{outline:2px solid currentColor;outline-offset:1px}
  .chip[data-b=last]{background:var(--last-bg);color:var(--last-tx)}
  .chip[data-b=within]{background:var(--within-bg);color:var(--within-tx)}
  .chip[data-b=silent]{background:var(--silent-bg);color:var(--silent-tx)}
  .chip[data-b=next]{background:var(--next-bg);color:var(--next-tx)}
  .chip[data-b=owe]{background:var(--owe-bg);color:var(--owe-tx)}
  .chip[data-b=mtg]{background:var(--next-bg);color:var(--next-tx)}
  .chip[data-b=cold]{background:#EEF1F5;color:#475569}
  .mtg{margin-left:7px;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;vertical-align:middle}
  .mtg.ok{background:#dcfce7;color:#166534}
  .mtg.no{background:#fee2e2;color:#991B1B}
  .mtg.unv{background:#fef3c7;color:#92400e}
  .chip[data-b=rem]{background:#F3ECFB;color:#6D28D9}
  .addq{margin-top:9px;width:100%;border:none;background:var(--ink);color:#fff;border-radius:8px;padding:8px;font-size:13px;font-weight:800;display:inline-flex;gap:6px;align-items:center;justify-content:center}

  .scroll{flex:1;overflow-y:auto;min-height:0;padding:0 9px 10px;display:flex;flex-direction:column;gap:10px}
  .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:#d2dbe6;border-radius:8px}
  .card{flex:0 0 auto;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:#fff}
  .nm{text-align:center;font-weight:800;font-size:15.5px;padding:8px;border-bottom:1px solid var(--line)}
  .fu{display:flex;justify-content:space-between;padding:7px 11px;background:var(--fu-bg);color:var(--fu-tx);font-size:13px;font-weight:600}
  .fu .d{font-weight:900}
  .chain{padding:8px 9px;display:flex;flex-direction:column;gap:7px}
  .cm{border-radius:8px;padding:6px 9px;background:#fff;color:#111;border:1px solid #e7e7e7}
  /* Bubble color = WHO, never channel (Gideon): cream for them, green for us, regardless of WhatsApp/email. Channel shows only on the vtag chip. */
  .cm.them,.cm.them.email{background:#FBF4E9;color:#3a2e16;border:1px solid #EADBC4}
  .cm.us.email{background:#d9fdd3;color:#0b3d0b;border:1px solid #c5e8ba}
  .cm .h{font-size:9.5px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px;opacity:.85}
  .vtag{font-size:9px;font-weight:800;letter-spacing:.03em;padding:1px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}
  .vtag.wa{background:#d9fdd3;color:#0b6b2e} .vtag.email{background:#dbeafe;color:#1e40af}
  .cm .x{font-size:13px;line-height:1.45}
  .cm .tr{font-size:11px;margin-top:3px;opacity:.85;direction:ltr;text-align:left}
  .cm.us{background:#d9fdd3;color:#0b3d0b;border:1px solid #c5e8ba} .cm.last{background:var(--last-bg);color:var(--last-tx)}
  /* Editable draft boxes: show she can type here. */
  .qsend .sb[contenteditable="true"]{outline:none;cursor:text;min-height:1.4em}
  .qsend .sb[contenteditable="true"]:focus{box-shadow:inset 0 0 0 2px #93c5fd;border-radius:6px}
  /* Empty-state hint: if Nora couldn't suggest anything, show her she can still type. */
  .qsend .sb[contenteditable="true"]:empty::before{content:attr(data-placeholder);color:#9ca3af;font-style:italic}
  .cm.within{background:var(--within-bg);color:var(--within-tx)} .cm.silent{background:var(--silent-bg);color:var(--silent-tx)}
  .cm.next{background:var(--next-bg);color:var(--next-tx)} .cm.owe{background:var(--owe-bg);color:var(--owe-tx)}
  .approvals .qcap{background:#7a1f6b}
  .apbody{flex:1;overflow-y:auto;min-height:0;padding:10px;display:flex;flex-direction:column;gap:10px}
  .apcard{flex:0 0 auto;border:1px solid #e7d2e4;border-radius:11px;background:#fff;padding:10px}
  .apnm{font-weight:800;font-size:14px}
  .apsub{font-size:11px;color:#9a4f8e;margin:2px 0 7px}
  .apes{font-size:12px;color:#555;background:#faf3f8;border-radius:7px;padding:6px 8px;margin-bottom:6px}
  .aphe{font-size:14px;color:#111;background:#d9fdd3;border:1px solid #c5e8ba;border-radius:7px;padding:7px 9px;direction:rtl;text-align:right}
  .aprow{display:flex;gap:8px;margin-top:9px}
  .apok{flex:1;background:#16a34a;color:#fff;border:0;border-radius:8px;padding:9px;font-weight:700;cursor:pointer}
  .apno{background:#fff;color:#b42318;border:1px solid #f0c8c2;border-radius:8px;padding:9px 12px;font-weight:700;cursor:pointer}
  .cfoot{display:flex;justify-content:flex-end;padding:0 9px 9px}
  .qadd{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:7px;padding:4px 10px;font-size:12px;font-weight:700;display:inline-flex;gap:5px;align-items:center}
  .more{text-align:center;color:var(--dim);font-size:11.5px;padding:3px}

  /* queue / chat panel */
  .queue{width:380px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border:2px solid #0F172A;border-radius:14px;overflow:hidden}
  .qcap{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#0F172A;color:#fff;flex-shrink:0}
  .qcap b{font-weight:800;font-size:15px;flex:1}
  .qcap .pos{font-size:12px;opacity:.85;font-weight:700}
  /* Layout flip (Gideon): controls pinned on TOP, history scrolls BELOW, up-arrows between. */
  .qbody{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
  .qhist{min-height:150px;border-top:1px solid var(--line)}
  .qup{display:flex;align-items:center;justify-content:center;gap:10px;color:#94a3b8;font-size:11px;font-weight:800;letter-spacing:.12em;padding:7px;background:#F8FAFC;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  /* Both-card strip: last WhatsApp + last email side-by-side (Gideon D). */
  .bothstrip{margin:0 13px 6px;border:1px solid var(--line);border-radius:9px;padding:8px;background:#FAFBFD}
  .preftag{font-size:11px;font-weight:800;color:#92400E;background:#FBF1DC;border-radius:6px;padding:3px 8px;display:inline-block;margin-bottom:6px}
  .bsrow{display:flex;gap:8px}
  .bscol{flex:1;min-width:0;border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff}
  .bshd{font-size:10px;font-weight:900;letter-spacing:.04em;margin-bottom:3px}
  .bshd.wa{color:var(--wa)} .bshd.email{color:var(--email)}
  .bsmsg{font-size:11.5px;line-height:1.35;color:var(--ink);word-break:break-word}
  .bssent{font-size:10px;color:var(--dim);margin-top:4px;font-weight:700}
  .qwho{padding:10px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .qwho .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
  .qwho b{font-size:17px;font-weight:800;display:block}
  .qwho .ch{font-size:12px;font-weight:700}
  .qsec{padding:10px 13px;border-bottom:1px solid var(--line)}
  .qsec .lbl{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--dim);text-transform:uppercase;margin-bottom:7px}
  .nora{margin:10px 13px;padding:10px 12px;background:#FFFDF5;border:1px solid #FFCC3366;border-left:4px solid #FFCC33;border-radius:9px}
  .nora .lbl{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:.05em;margin-bottom:6px}
  /* All four boxes equal width (Gideon E): stack the two tone options full-width like the two draft boxes. */
  .tones{display:flex;flex-direction:column;gap:7px}
  .tone{min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 9px;background:#fff;text-align:left}
  .tone.sel{border-color:#0F172A;box-shadow:0 0 0 1px #0F172A}
  .tone .tn{font-weight:800;font-size:12.5px}
  .tone .tx{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.4}
  .qsend{margin:6px 13px 4px;padding:10px 12px;border:2px solid var(--wa);border-radius:10px}
  .qsend .sl{font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .qsend .sb{font-size:15px;line-height:1.5}
  .qinsert{padding:8px 13px;border-top:1px solid var(--line)}
  .qinsert .il{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
  .qinsert .row{display:flex;gap:6px;flex-wrap:wrap}
  .ins{border:1px solid #c7d6ec;background:#EEF4FE;color:#1E40AF;border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:700;display:inline-flex;gap:5px;align-items:center}
  .ins:hover{background:#E0EAFB}
  .ins.invite{background:#FFF6DE;border-color:#f0d8a0;color:#92400E}
  .qoutcome{padding:8px 13px;border-top:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .qoutcome .ol{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--dim);text-transform:uppercase;margin-right:2px}
  .oc{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12.5px;font-weight:700}
  .oc.booked{color:#166534;border-color:#bbe8c8} .oc.no{color:#991B1B;border-color:#f3c4c4} .oc.remind{color:#6D28D9;border-color:#dac8f5}
  .qact{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:10px 13px;border-top:1px solid var(--line);flex-shrink:0}
  .qb{border:1px solid var(--line);background:#F8FAFC;color:var(--ink);border-radius:9px;padding:9px 13px;font-size:14px;font-weight:800;display:inline-flex;gap:5px;align-items:center}
  .qb.send{background:#16A34A;border-color:#16A34A;color:#fff} .qb.snooze{background:#fff7e0;border-color:#f0d8a0;color:#92400E}
  .qb.next{margin-left:auto;background:#FFCC33;border-color:#FFCC33;color:#3a2c00}
  .qempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);text-align:center;padding:24px}
  .qempty .big{font-size:20px;font-weight:800;color:var(--mut);margin-bottom:6px}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;font-size:14px;font-weight:700;padding:11px 18px;border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.3);opacity:0;transition:opacity .2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
</style></head>

    {k:'noreply',       es:'Sin respuesta', en:'No reply',       cls:'t-gray'},

    {k:'attended',      es:'Asistió',       en:'Attended',       cls:'t-green'},
    {k:'noshow',        es:'No vino',       en:'No-show',        cls:'t-red'},

  function statusKeys(p){

  function P(name,channel,bucket,fu,fuDate,chain,opts){return Object.assign({name:name,channel:channel,bucket:bucket,fu:fu,fuDate:fuDate,chain:chain,queued:false},opts||{});}

  function cmHTML(c){
    var cls=(c.who==='us'?'us':'them')+(c.via==='email'?' email':'');
    var head=(c.who==='us'?l().us:l().them)+' · '+c.date;
    // SPANISH side (secretary): a Hebrew message shows its SPANISH as the main text
    // (Hebrew kept tiny below); English stays English.
    // ENGLISH side (Gideon/Shirel): show the ORIGINAL untouched — Hebrew or English,
    // no translation (they read both).
    var es=state.lang==='es';
    // Secretary (es): ALWAYS prefer the Spanish text — never fall back to Hebrew
    // when Spanish exists. English content stays English. Gideon/Shirel (en): original.
    var primary = es ? (c.es || c.he || c.en || '') : (c.he || c.en || c.es || '');
    // Voice note with no usable transcript yet → a clear localized label instead
    // of a bare mic glyph, so the ▶ player below still has a caption.
    if(c.audio && (primary===''||primary==='🎤')) primary='🎤 '+(es?'Mensaje de voz':'Voice message');
    var heMain = !es && !!c.he;
    var main = '<div class="x'+(heMain?' he':'')+'">'+esc(primary)+'</div>';
    // The actual voice memo — a play button to listen, separate from the transcript.
    var audio = c.audio ? '<audio class="vn" controls preload="none" src="'+esc(c.audio)+'" style="width:100%;max-width:280px;height:34px;margin:5px 0 1px;display:block"></audio>' : '';
    var tr = (es && c.he && primary!==c.he) ? '<div class="tr he">'+esc(c.he)+'</div>' : '';
    var vtag=c.via?'<span class="vtag '+c.via+'">'+(c.via==='email'?'📧 Email':'WhatsApp')+'</span>':'';
    return '<div class="cm '+cls+'"><div class="h">'+esc(head)+vtag+'</div>'+main+audio+tr+'</div>';
  }
  // BOTH-card (Gideon D): for a contact we have on WhatsApp AND email, show the
  // last message on EACH channel side-by-side, which channel they usually reply on,
  // and when we last sent on each — so the secretary never double-sends.
  function bothSummary(p){
    var ch=p.chain||[], lastWA=null,lastEmail=null,themWA=0,themEmail=0,lastUsWA=null,lastUsEmail=null;
    ch.forEach(function(c){
      if(c.via==='wa'){ lastWA=c; if(c.who==='them')themWA++; if(c.who==='us')lastUsWA=c; }
      else if(c.via==='email'){ lastEmail=c; if(c.who==='them')themEmail++; if(c.who==='us')lastUsEmail=c; }
    });
    return {lastWA:lastWA,lastEmail:lastEmail,lastUsWA:lastUsWA,lastUsEmail:lastUsEmail,prefer:(themWA===themEmail?'':(themWA>themEmail?'wa':'email'))};
  }

  function renderColumn(ch){

  function renderQueue(){
    var q=PEOPLE.map(function(p,i){return {p:p,i:i};}).filter(function(o){return o.p.queued;});
    var el=document.getElementById('queue');
    if(!q.length){ el.innerHTML='<div class="qcap"><b>'+esc(l().queue)+'</b></div><div class="qempty"><div class="big">✓ '+esc(l().empty)+'</div><div>'+esc(l().emptySub)+'</div></div>'; return; }
    if(state.qi>=q.length) state.qi=q.length-1;

    var ch=CHMETA[p.channel].ac, chLabel=l()[p.channel];
    var draftEs={es:'Perfecto. Le agendo el jueves a las 10:00 y le envío el enlace ahora.',en:'Perfect. Booking thursday at 10:00 and sending the link now.'}[state.lang];
    var draftHe='מצוין. קבעתי ליום חמישי בעשר ושולח עכשיו את הלינק.';

    var _lastThem=null;(p.chain||[]).forEach(function(c){if(c.who==='them')_lastThem=c;});

          '<span style="flex:1;min-width:0"><b>'+esc(p.name)+'</b><span class="ch" style="color:'+ch+'">'+esc(chLabel)+(p.channel==='both'?'':'')+'</span></span></div>'+
        (p.channel==='both'?renderBothStrip(p):'')+
        '<div class="nora"><div class="lbl">'+esc(l().nora)+'</div><div class="tones">'+
          '<button class="tone'+(state.tone==='friendly'?' sel':'')+'" data-tone="friendly"><div class="tn">'+esc(l().friendly)+'</div><div class="tx">'+(state.lang==='es'?'“claro, le agendo con gusto…”':'“sure, happy to book you…”')+'</div></button>'+
          '<button class="tone'+(state.tone==='prof'?' sel':'')+'" data-tone="prof"><div class="tn">'+esc(l().prof)+'</div><div class="tx">'+(state.lang==='es'?'más corto y formal':'shorter, formal')+'</div></button>'+

          '<div class="sl" style="margin-top:8px">'+esc(state.lang==='es'?('Se envía así · '+(state._outLang==='en'?'inglés':state._outLang==='es'?'español':'hebreo')):('Sends as · '+(state._outLang==='en'?'English':state._outLang==='es'?'Spanish':'Hebrew')))+'</div><div class="sb '+(state._outLang||'he')+'" contenteditable="true" spellcheck="true" data-sb="he" data-placeholder="'+esc(state._outLang==='en'?'Type your reply here':(state.lang==='es'?'Escribe la versión que se envía':'הקלד את התשובה'))+'">'+esc(draftHe)+'</div></div>'+
        '<div class="qinsert"><div class="il">'+esc(l().insLbl)+'</div><div class="row">'+
          '<button class="ins invite" data-ins="invite">✉ '+esc(l().ins.invite)+'</button>'+
          '<button class="ins" data-ins="video">▶ '+esc(l().ins.video)+'</button>'+
          '<button class="ins" data-ins="book">📅 '+esc(l().ins.book)+'</button>'+
          '<button class="ins" data-ins="link">🔗 '+esc(l().ins.link)+'</button>'+
        '</div></div>'+
        '<div class="qoutcome"><span class="ol">'+esc(l().ocLbl)+'</span>'+
          '<button class="oc booked" data-oc="booked">✓ '+esc(l().oc.booked)+'</button>'+
          '<button class="oc no" data-oc="no">✕ '+esc(l().oc.no)+'</button>'+
          '<button class="oc remind" data-oc="remind1w">⏳ '+esc(state.lang==='es'?'Recordar +1 sem':'Remind +1 wk')+'</button>'+
          '<button class="oc remind" data-oc="remind">⏳ '+esc(l().oc.remind)+'</button>'+
        '</div>'+
        '<div class="qmedia" style="display:flex;gap:8px;padding:6px 13px">'+
          '<button class="qb attach" data-media="attach">📎 '+esc(state.lang==='es'?'Adjuntar archivo':'Attach file')+'</button>'+
          (canRecord?('<button class="qb rec" data-media="rec">🎤 '+esc(state.lang==='es'?'Grabar voz':'Record voice')+'</button>'):'')+

        '<div class="qact">'+
          '<button class="qb send" data-q="send">➤ '+esc(l().send)+'</button>'+

        '<div class="qsec qhist"><div class="lbl">'+esc(state.lang==='es'?'Historial':'History')+'</div><div class="chain">'+p.chain.map(cmHTML).join('')+'</div></div>'+

  function renderStats(){

    STATUS_TAGS.forEach(function(t){
      var sel=state.statusFilter===t.k?' sel':'';
      html+='<button class="stat act '+t.cls+sel+'" data-status="'+t.k+'">'+(es?t.es:t.en)+' <b>'+(cnt[t.k]||0)+'</b></button>';

  function renderAll(){

    document.querySelectorAll('[data-cat]').forEach(function(b){b.onclick=function(){var cat=this.dataset.cat,grp=[];if(cat==='rep')grp=repliedPeople();else if(cat==='book')grp=PEOPLE.filter(function(p){return !p.queued&&p.booked;});if(!grp.length){toast(state.lang==='es'?'Nada para agregar':'Nothing to add');return;}grp.forEach(function(p){p.queued=true;});toast((state.lang==='es'?'Agregados ':'Added ')+grp.length+(state.lang==='es'?' a la cola':' to queue'));renderAll();};});
    document.querySelectorAll('.tone').forEach(function(t){t.onclick=function(){state.tone=this.dataset.tone;renderQueue();bindQueue();};});
    bindQueue();
  }
  function bindQueue(){
    document.querySelectorAll('[data-q]').forEach(function(b){b.onclick=function(){
      var a=this.dataset.q, q=PEOPLE.filter(function(p){return p.queued;}), o=q[state.qi]; if(!o&&a!=='next')return;

      else if(a==='snooze'){o.queued=false;o.bucket='silent';toast(state.lang==='es'?'Pospuesto → archivo':'Snoozed → archive');renderAll();}
      else if(a==='skip'){state.qi=Math.min(q.length-1,state.qi+1);renderQueue();bindQueue();}

      else if(a==='next'){state.qi=Math.min(q.length-1,state.qi+1);renderQueue();bindQueue();}
    };});
    document.querySelectorAll('[data-ins]').forEach(function(b){b.onclick=function(){toast(l().inserted+': '+l().ins[this.dataset.ins]);};});
    document.querySelectorAll('[data-oc]').forEach(function(b){b.onclick=function(){var q=PEOPLE.filter(function(p){return p.queued;}),o=q[state.qi];if(!o)return;o.queued=false;var oc=this.dataset.oc;if(oc==='booked'){o.booked=true;o.bucket='mtg';toast(l().outBooked);}else if(oc==='no'){o.bucket='cold';toast(l().outNo);}else{o.bucket='rem';toast(l().outRem);}renderAll();};});

<script>
/* LIVE WIRING — fills your design with the real roster + sends through the backend */
(function(){
  var PASS=new URLSearchParams(location.search).get('p')||localStorage.getItem('center_pass');
  if(!PASS){PASS=window.prompt('Password');}
  if(PASS) localStorage.setItem('center_pass',PASS);
  function H(){return {'Content-Type':'application/json','x-center-pass':PASS};}
  function bucketOf(c){ if(c.awaitingUs)return 'owe'; if(c.stage==='booked')return 'mtg'; if(c.stage==='declined')return 'cold'; if(c.snoozed)return 'rem'; if(c.stage==='replied')return 'within'; return 'silent'; }
  function mapContact(c){
    var channel=(c.phone&&c.email)?'both':(c.phone?'wa':'email');
    var b=bucketOf(c), who=c.lastFrom==='us'?'us':'them', raw=(c.lastReply||'').trim();
    // Only a REAL message counts — must contain letters (Hebrew or Latin). A bare
    // phone number / digits is not a message, so it must never show as the preview.
    var msg=/[A-Za-z֐-׿]/.test(raw)?raw:'';
    var snip=msg.length>120?msg.slice(0,120).trim()+'…':msg;            // card = quick summary, not the whole message
    var he=/[֐-׿]/.test(snip)?snip:'';
    // Prefer the stored multi-message thread (last several, both directions) so
    // every card shows the back-and-forth, not just one line. Fall back to the

        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><div style="font-weight:800;font-size:14.5px">'+esc(r.name||'')+'</div><span style="background:'+sevBg+';color:'+sev+';font-weight:900;font-size:11px;padding:3px 8px;border-radius:999px">'+sevLbl+'</span></div>'+
        '<div style="color:#64748b;font-size:12.5px;margin-top:4px">'+esc(r.email_audit_note||'')+'</div>'+

          '<div style="font-size:12px;color:#475569;font-weight:700;width:55px">'+(es?'Ahora':'Current')+':</div><div style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:#0f172a;background:#f1f5f9;padding:5px 9px;border-radius:6px;flex:1;min-width:0;overflow-x:auto">'+esc(r.email||'')+'</div></div>'+
        '<div style="display:flex;gap:8px;margin-top:7px;align-items:center;flex-wrap:wrap">'+

          '<button data-fix="'+r.source_row+'" style="border:none;background:#0F172A;color:#fff;border-radius:8px;padding:7px 13px;font-weight:800;cursor:pointer;font-size:12.5px">'+(es?'Guardar':'Fix')+'</button>'+
          '<button data-ok="'+r.source_row+'" style="border:1px solid #cbd5e1;background:#fff;color:#0F172A;border-radius:8px;padding:7px 13px;font-weight:700;cursor:pointer;font-size:12.5px">'+(es?'Verificado':'Verified')+'</button>'+
        '</div></div>';
    }).join('');
    document.getElementById('auditModal').style.display='flex';
    list.querySelectorAll('[data-fix]').forEach(function(b){b.onclick=function(){var sr=this.dataset.fix;var inp=list.querySelector('input[data-em="'+sr+'"]');var v=(inp&&inp.value||'').trim();if(!v||v.indexOf('@')<0){inp&&inp.focus();return;}this.textContent='…';fetch('/api/center/email-audit',{method:'POST',headers:H(),body:JSON.stringify({source_row:Number(sr),action:'fix',new_email:v})}).then(function(r){return r.json();}).then(function(res){if(res&&res.ok){toast(es?'Corregido':'Fixed');renderAudit();openAudit();}else{toast((res&&res.error)||'Error');}});};});
    list.querySelectorAll('[data-ok]').forEach(function(b){b.onclick=function(){var sr=this.dataset.ok;if(!window.confirm(es?'¿Confirmas que el email actual es correcto?':'Confirm the current email is correct?'))return;this.textContent='…';fetch('/api/center/email-audit',{method:'POST',headers:H(),body:JSON.stringify({source_row:Number(sr),action:'clear'})}).then(function(r){return r.json();}).then(function(res){if(res&&res.ok){toast(es?'Verificado':'Verified');renderAudit();openAudit();}});};});
  }
  // 5th panel — ENGLISH-ONLY Approvals. Shows the Spanish secretary's
  // Hebrew<->Spanish drafts waiting for approval; hidden entirely when empty or
  // when viewing in Spanish. Approve = send + vanish.
  window.renderApprovals=function(){
    var box=document.getElementById('col-approvals'); if(!box)return;
    if(state.lang!=='en'){ box.style.display='none'; box.innerHTML=''; return; }
    fetch('/api/center/approval',{headers:{'x-center-pass':PASS}}).then(function(r){return r.json();}).then(function(j){
      var items=(j&&j.approvals)||[];
      if(!items.length){ box.style.display='none'; box.innerHTML=''; return; }
      box.style.display='';
      box.innerHTML='<div class="qcap"><b>Approvals</b><span class="pos">'+items.length+'</span></div>'+
        '<div class="apbody">'+items.map(function(a){
          return '<div class="apcard"><div class="apnm">'+esc(a.contact_name||'')+' · '+esc(a.channel||'')+'</div>'+

            (a.draft_es?'<div class="apes">'+esc(a.draft_es)+'</div>':'')+
            '<div class="aphe">'+esc(a.draft_he||'')+'</div>'+
            '<div class="aprow"><button class="apok" data-ap="'+esc(a.id)+'" data-name="'+esc(a.contact_name||'')+'" data-ch="'+esc(a.channel||'')+'">✓ Approve &amp; send</button>'+
            '<button class="apno" data-apx="'+esc(a.id)+'">✕ Reject</button></div></div>';
        }).join('')+'</div>';
      box.querySelectorAll('[data-ap]').forEach(function(b){b.onclick=function(){var id=this.dataset.ap;this.textContent='…';fetch('/api/center/approval',{method:'POST',headers:H(),body:JSON.stringify({action:'approve',id:id})}).then(function(r){return r.json();}).then(function(res){toast(res&&res.ok?'Sent':('Failed'+(res&&res.error?': '+res.error:'')));window.renderApprovals();}).catch(function(){toast('Failed');});};});
      box.querySelectorAll('[data-apx]').forEach(function(b){b.onclick=function(){var id=this.dataset.apx;fetch('/api/center/approval',{method:'POST',headers:H(),body:JSON.stringify({action:'reject',id:id})}).then(function(){window.renderApprovals();});};});
    }).catch(function(){});
  };
  // --- Excel / CSV upload -------------------------------------------------
  // The top-bar Upload button opens a hidden file picker, parses CSV inline or
  // .xlsx via SheetJS (loaded once on demand), maps columns by header in any
  // order, POSTs {rows} to /api/center/upload, then refreshes the board.
  function loadSheetJS(){
    return new Promise(function(res,rej){
      if(window.XLSX)return res(window.XLSX);
      if(window._xlsxLoading)return window._xlsxLoading.then(res,rej);
      window._xlsxLoading=new Promise(function(r,j){
        var s=document.createElement('script');
        s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
        s.onload=function(){r(window.XLSX);}; s.onerror=function(){j(new Error('sheetjs'));};
        document.head.appendChild(s);
      });
      window._xlsxLoading.then(res,rej);
    });
  }
  function normKey(s){ return String(s==null?'':s).toLowerCase().replace(/[^a-z]/g,''); }
  function rowsFromAOA(aoa){
    if(!aoa||!aoa.length)return [];
    var header=aoa[0].map(normKey), idx={name:-1,phone:-1,email:-1};
    header.forEach(function(h,i){
      if(idx.name<0 && (h==='name'||h==='nombre'||h==='fullname'||h==='contacto'))idx.name=i;
      if(idx.phone<0 && (h==='phone'||h==='whatsapp'||h==='telefono'||h==='tel'||h==='mobile'||h==='celular'||h==='movil'))idx.phone=i;
      if(idx.email<0 && (h==='email'||h==='correo'||h==='mail'||h==='ecorreo'))idx.email=i;
    });
    var out=[];
    for(var r=1;r<aoa.length;r++){
      var row=aoa[r]||[];
      var name=idx.name>=0?String(row[idx.name]==null?'':row[idx.name]).trim():'';
      var phone=idx.phone>=0?String(row[idx.phone]==null?'':row[idx.phone]).trim():'';
      var email=idx.email>=0?String(row[idx.email]==null?'':row[idx.email]).trim():'';
      if(name||phone||email)out.push({name:name,phone:phone,email:email});
    }
    return out;
  }
  function parseCSV(text){
    var lines=text.replace(/\r\n?/g,'\n').split('\n').filter(function(x){return x.length;});
    return lines.map(function(line){
      var cells=[],cur='',q=false;
      for(var i=0;i<line.length;i++){var ch=line[i];
        if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
        else { if(ch==='"')q=true; else if(ch===','){cells.push(cur);cur='';} else cur+=ch; }
      }
      cells.push(cur); return cells;
    });
  }
  function dupPanel(names){
    var old=document.getElementById('dupPanel'); if(old)old.remove();
    if(!names||!names.length)return;
    var d=document.createElement('div'); d.id='dupPanel';
    d.style.cssText='position:fixed;top:58px;right:14px;max-width:320px;max-height:50vh;overflow:auto;background:#fff;border:1px solid #f0c8c2;border-left:4px solid #DC2626;border-radius:10px;box-shadow:0 8px 26px rgba(0,0,0,.25);padding:11px 13px;z-index:60;font-family:Inter,sans-serif';
    d.innerHTML='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><b style="color:#991B1B;font-size:13px;flex:1">'+(state.lang==='es'?'Duplicados (omitidos)':'Duplicates (skipped)')+'</b><button id="dupX" style="border:none;background:transparent;color:#991B1B;font-weight:900;font-size:15px;cursor:pointer">✕</button></div>'+
      names.map(function(n){return '<div style="color:#DC2626;font-size:12.5px;padding:2px 0">'+esc(n)+'</div>';}).join('');
    document.body.appendChild(d);
    document.getElementById('dupX').onclick=function(){d.remove();};
  }
  function submitRows(rows){
    if(!rows.length){toast&&toast(state.lang==='es'?'Sin filas':'No rows');return;}
    fetch('/api/center/upload',{method:'POST',headers:H(),body:JSON.stringify({rows:rows})})
      .then(function(r){return r.json();}).then(function(res){
        var added=(res&&(res.added!=null?res.added:res.inserted))||0;
        var dups=(res&&(res.duplicates||res.dupes))||[];
        var dupN=Array.isArray(dups)?dups.length:(res&&res.duplicateCount)||0;
        toast&&toast((state.lang==='es'?'Agregados ':'Added ')+added+' · '+dupN+(state.lang==='es'?' duplicados':' duplicates'));
        if(Array.isArray(dups)&&dups.length){ dupPanel(dups.map(function(d){return typeof d==='string'?d:(d&&d.name)||'';}).filter(Boolean)); }
        loadLive(); renderAll();
      }).catch(function(){toast&&toast(state.lang==='es'?'Error al subir':'Upload failed');});
  }
  function handleFile(file){
    if(!file)return;
    var isCsv=/\.csv$/i.test(file.name);
    if(isCsv){
      var fr=new FileReader();
      fr.onload=function(){ submitRows(rowsFromAOA(parseCSV(String(fr.result)))); };
      fr.readAsText(file);
    } else {
      loadSheetJS().then(function(XLSX){
        var fr=new FileReader();
        fr.onload=function(){
          var wb=XLSX.read(new Uint8Array(fr.result),{type:'array'});
          var ws=wb.Sheets[wb.SheetNames[0]];
          var aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});
          submitRows(rowsFromAOA(aoa));
        };
        fr.readAsArrayBuffer(file);
      }).catch(function(){toast&&toast(state.lang==='es'?'No se pudo cargar el lector':'Could not load reader');});
    }
  }
  (function wireUpload(){
    if(document.getElementById('uploadFile'))return;            // idempotent
    var inp=document.createElement('input');
    inp.type='file'; inp.id='uploadFile'; inp.accept='.csv,.xlsx,.xls'; inp.style.display='none';
    document.body.appendChild(inp);
    inp.onchange=function(){ var f=inp.files&&inp.files[0]; inp.value=''; handleFile(f); };
    var btn=document.getElementById('uploadLbl');
    var clicker=(btn&&btn.closest)?btn.closest('.tbtn'):btn;
    if(clicker)clicker.style.cursor='pointer';
    if(clicker)clicker.onclick=function(){ inp.click(); };
  })();

  window.PEOPLE=[]; loadLive();

    function start(){
      try{

         .on('postgres_changes',{event:'*',schema:'public',table:'roster'},function(){
           clearTimeout(t); t=setTimeout(function(){ loadLive(); }, 600);
         })

        window._rtOn=true;
      }catch(e){}
    }
    if(window.supabase&&window.supabase.createClient){ start(); }
    else{ var s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'; s.onload=start; s.onerror=function(){}; document.head.appendChild(s); }
  })();
  // Email-audit top-bar warning button — opens the inline-fix modal.
  (function wireAudit(){
    var btn=document.getElementById('auditBtn'); if(btn)btn.onclick=function(){openAudit();};
    var cls=document.getElementById('auditCls'); if(cls)cls.onclick=function(){document.getElementById('auditModal').style.display='none';};

  })();
})();
